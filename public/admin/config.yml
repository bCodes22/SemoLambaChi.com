backend:
  name: git-gateway
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "leadership"
    label: "Chapter Leadership"
    files:
      - name: "leadership"
        label: "Executive Board"
        file: "src/content/leadership.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string", required: false }
              - { label: "Position", name: "position", widget: "string" }
              - { label: "Photo", name: "image", widget: "image", required: false }

  - name: "events"
    label: "Events"
    files:
      - name: "events"
        label: "Upcoming Events"
        file: "src/content/events.json"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "string", required: false, hint: "e.g. September 20, 2026" }
              - { label: "Time", name: "time", widget: "string", required: false, hint: "e.g. 5:00 PM" }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

  - name: "flyers"
    label: "Event Flyers"
    files:
      - name: "flyers"
        label: "Flyers"
        file: "src/content/flyers.json"
        fields:
          - label: "Flyers"
            name: "flyers"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string", hint: "Short description of the flyer, for accessibility" }

  - name: "brotherhood"
    label: "Brotherhood Spotlights"
    files:
      - name: "spotlights"
        label: "Spotlights"
        file: "src/content/brotherhoodSpotlights.json"
        fields:
          - label: "Spotlights"
            name: "spotlights"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Year", name: "year", widget: "string", required: false, hint: "e.g. Senior" }
              - { label: "Major", name: "major", widget: "string", required: false }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Quote", name: "quote", widget: "text" }

  - name: "alumni"
    label: "Alumni Spotlights"
    files:
      - name: "spotlights"
        label: "Spotlights"
        file: "src/content/alumniSpotlights.json"
        fields:
          - label: "Spotlights"
            name: "spotlights"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Year", name: "year", widget: "string", required: false }
              - { label: "Position", name: "position", widget: "string", required: false, hint: "e.g. current job or title" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Quote", name: "quote", widget: "text" }
